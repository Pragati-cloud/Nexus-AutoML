  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #0A0F1A, #05070B);
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

      background: linear-gradient(90deg, #4F8CFF, #6C63FF, #A855F7);

    }

    p {
      color: #A1A1AA;
      margin: 20px 0;
      line-height: 1.5;
    }

    .loader {
      margin: 25px auto;
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #4F8CFF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 20px rgba(79,140,255,0.5);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      background: linear-gradient(90deg, #4F8CFF, #6C63FF, #A855F7);
      color: #fff;
      transition: 0.3s ease;
      box-shadow: 0 0 15px rgba(79,140,255,0.4);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(168,85,247,0.6);
    }

  </style>
